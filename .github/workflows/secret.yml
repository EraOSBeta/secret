on:
  workflow_dispatch:

jobs:
  runsecret:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - run: |
          python -m pip install --upgrade pip
          pip install cryptography requests

      - env:
          CONFIG_TOML: ${{ secrets.CONFIG_TOML }}
          SECRET_PY: ${{ secrets.SECRET_PY }}
        run: |
          echo "$CONFIG_TOML" > config.toml
          echo "$SECRET_PY" > secret.py

      - run: |
          python secret.py
